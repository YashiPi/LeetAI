name: Daily LeetCode POTD Scrape

on:
  schedule:
    - cron: "0 0 * * *"   # 00:00 UTC = 5:30 AM IST

  workflow_dispatch:
    inputs:
      date_override:
        description: "Override date (YYYY-MM-DD) — blank = today"
        required: false
        default: ""
      force_rescrape:
        description: "Force re-scrape even if data exists"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]

jobs:
  scrape-potd:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2

      - name: Set up Python 3.11
        uses: actions/setup-python@v5.6.0
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Python dependencies
        run: pip install -r scripts/requirements.txt

      - name: Install Playwright browsers
        run: playwright install chromium --with-deps

      - name: Set target date
        run: |
          if [ -n "${{ github.event.inputs.date_override }}" ]; then
            echo "TARGET_DATE=${{ github.event.inputs.date_override }}" >> $GITHUB_ENV
          else
            echo "TARGET_DATE=$(date -u +%Y-%m-%d)" >> $GITHUB_ENV
          fi

      - name: Run scraper
        run: |
          FLAGS=""
          [ -n "${{ github.event.inputs.date_override }}" ] && FLAGS="$FLAGS --date ${{ github.event.inputs.date_override }}"
          [ "${{ github.event.inputs.force_rescrape }}" = "true" ] && FLAGS="$FLAGS --force"
          python scripts/scrape_potd.py $FLAGS
        env:
          PYTHONUNBUFFERED: "1"
          LEETCODE_SESSION: ${{ secrets.LEETCODE_SESSION }}
          LEETCODE_CSRF_TOKEN: ${{ secrets.LEETCODE_CSRF_TOKEN }}

      - name: Commit and push data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --staged --quiet; then
            echo "Nothing new to commit."
          else
            TITLE=$(python -c "
          import json, os
          p = f\"data/{os.environ['TARGET_DATE']}.json\"
          d = json.load(open(p))
          print(d['problem']['title'])
          " 2>/dev/null || echo "Problem")
            git commit -m "feat: POTD $TARGET_DATE — $TITLE"
            git push
          fi
        env:
          TARGET_DATE: ${{ env.TARGET_DATE }}

      - name: Summary
        if: always()
        run: |
          FILE="data/${{ env.TARGET_DATE }}.json"
          if [ -f "$FILE" ]; then
            echo "### ✅ Scrape Successful" >> $GITHUB_STEP_SUMMARY
            python -c "
          import json
          d = json.load(open('$FILE'))
          p = d['problem']
          ed = d.get('editorial', {})
          sol = d['best_solution']
          comm = d.get('community_solutions', {})
          total = sum(len(v) for v in comm.values())
          print('| Field | Value |')
          print('|---|---|')
          print(f\"| Problem | #{p['id']} {p['title']} |\")
          print(f\"| Difficulty | {p['difficulty']} |\")
          print(f\"| Tags | {', '.join(p.get('tags',[]))} |\")
          print(f\"| Editorial | {'yes' if ed.get('available') else 'no'} |\")
          print(f\"| Community Solutions | {total} |\")
          print(f\"| Best Source | {sol['source_type']} |\")
          " >> $GITHUB_STEP_SUMMARY
          else
            echo "### ❌ Scrape Failed" >> $GITHUB_STEP_SUMMARY
          fi
